<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1240" viewBox="0 0 800 1240">
  <!-- Background -->
  <rect width="800" height="1240" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle"
