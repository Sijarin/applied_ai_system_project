  <text x="315" y="179" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">
    Input Guardrail
  </text>
  <text x="315" y="198" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#fff3e0">
