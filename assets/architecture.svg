  </text>
  <text x="637" y="647" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#7A6010">
    test_rag.py
  </text>
  <text x="637" y="664" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#7A6010">
