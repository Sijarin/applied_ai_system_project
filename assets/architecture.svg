  </defs>

  <!-- ===== COMPONENT 1: User Input ===== -->
  <rect x="175" y="55" width="280" height="55" rx="8"
        fill="#4A90D9" stroke="#2C6FAC" stroke-width="1.5"/>
  <text x="315" y="78" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">User</text>
  <text x="315" y="98" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#cce5ff">
    (natural language query)
  </text>

  <!-- Arrow 1 → 2 -->
  <line x1="315" y1="110" x2="315" y2="154" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr)"/>
  <text x="330" y="138" font-family="Arial, sans-serif" font-size="10" fill="#666">raw text</text>

  <!-- ===== COMPONENT 2: Input Guardrail — sanitize_text ===== -->
  <rect x="175" y="157" width="280" height="55" rx="8"
