  <rect x="32" y="884" width="18" height="12" rx="3" fill="#4CAF7D"/>
  <text x="58" y="895" font-family="Arial, sans-serif" font-size="11" fill="#333">AI / LLM</text>
  <rect x="32" y="906" width="18" height="12" rx="3" fill="#9B6BB0"/>
  <text x="58" y="917" font-family="Arial, sans-serif" font-size="11" fill="#333">Data Source</text>
  <rect x="32" y="928" width="18" height="12" rx="3" fill="#607D8B"/>
  <text x="58" y="939" font-family="Arial, sans-serif" font-size="11" fill="#333">Utility</text>

  <!-- ===== TEST LAYER NOTE ===== -->
